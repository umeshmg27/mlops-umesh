name: ci

on:
  push:
  pull_request:

jobs:
  test-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: pytest

      - name: Download data and train smoke model
        run: |
          python scripts/download_data.py
          python scripts/run_eda.py
          python scripts/train_model.py \
            --cv 3 \
            --tracking-uri file:/tmp/heart-disease-mlruns \
            --experiment-name ci-heart-disease-classification
