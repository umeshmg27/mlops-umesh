apiVersion: apps/v1
kind: Deployment
metadata:
  name: heart-ui
  namespace: heart-disease
spec:
  replicas: 1
  selector:
    matchLabels:
      app: heart-ui
  template:
    metadata:
      labels:
        app: heart-ui
    spec:
      containers:
        - name: ui
          image: heart-disease-mlops:latest
          imagePullPolicy: IfNotPresent
          command:
            - streamlit
            - run
            - ui/streamlit_app.py
            - --server.address=0.0.0.0
            - --server.port=8501
          ports:
            - containerPort: 8501
          env:
            - name: API_URL
              value: http://heart-api:8000
            - name: ARTIFACT_ROOT
              value: /app

