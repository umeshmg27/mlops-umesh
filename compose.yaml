services:
  api:
    build: .
    image: heart-disease-mlops:latest
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/models/model.joblib
      MODEL_METADATA_PATH: /app/models/metadata.json
      MLFLOW_TRACKING_URI: file:/app/mlruns
      LOG_LEVEL: INFO
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./mlruns:/app/mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  ui:
    image: heart-disease-mlops:latest
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
      ARTIFACT_ROOT: /app
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    command: ["streamlit", "run", "ui/streamlit_app.py", "--server.address=0.0.0.0", "--server.port=8501"]

  mlflow:
    image: heart-disease-mlops:latest
    depends_on:
      - api
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/app/mlruns
    command: ["mlflow", "ui", "--backend-store-uri", "file:/app/mlruns", "--host", "0.0.0.0", "--port", "5000"]

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
